  <circle cx="52" cy="52" r="12" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <!-- Dollar sign -->
  <text x="52" y="57.5" font-family="Helvetica,Arial,sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2D7A3E">$</text>
