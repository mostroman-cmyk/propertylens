<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="application-name" content="RedPurpleGreen" />
    <meta name="description" content="Property management and financial tracking for rental portfolios." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="RedPurpleGreen" />
    <meta property="og:title" content="RedPurpleGreen" />
    <meta property="og:description" content="Property management and financial tracking for rental portfolios." />
    <meta property="og:type" content="website" />
    <title>RedPurpleGreen</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
    (function() {
      // Tri-color house: red | purple | green — pulse scales from center
      function frame(scale) {
        var s = scale.toFixed(3);
        var t = 'translate(32,32) scale(' + s + ') translate(-32,-32)';
        return 'data:image/svg+xml,' + encodeURIComponent(
          '<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">' +
          '<defs><clipPath id="h"><path d="M4 28 L32 8 L60 28 L60 56 L4 56Z"/></clipPath></defs>' +
          '<g transform="' + t + '">' +
          '<rect x="0" y="0" width="21" height="64" fill="#E30613" clip-path="url(#h)"/>' +
          '<rect x="21" y="0" width="22" height="64" fill="#6B3FA0" clip-path="url(#h)"/>' +
          '<rect x="43" y="0" width="21" height="64" fill="#2D7A3E" clip-path="url(#h)"/>' +
          '<rect x="26" y="40" width="12" height="16" fill="#fff"/>' +
          '<rect x="9" y="32" width="11" height="11" rx="1" fill="#fff"/>' +
          '<rect x="44" y="32" width="11" height="11" rx="1" fill="#fff"/>' +
          '</g></svg>'
        );
      }

      // 10 frames × 600ms = 6s cycle: 5-frame pulse (1.0→1.08→1.0) + 5-frame rest
      var scales = [1, 1.04, 1.08, 1.04, 1, 1, 1, 1, 1, 1];
      var frames = scales.map(frame);

      var idx = 0, tid = null, stopAt = 0;

      var link = document.querySelector("link[rel='icon']");
      if (!link) { link = document.createElement('link'); link.rel = 'icon'; link.type = 'image/svg+xml'; document.head.appendChild(link); }
      link.href = frames[0];

      function stop() { clearInterval(tid); tid = null; idx = 0; link.href = frames[0]; }

      function start(ms) {
        clearInterval(tid); tid = null;
        idx = 0;
        stopAt = Date.now() + (ms || 8000);
        tid = setInterval(function() {
          idx = (idx + 1) % frames.length;
          link.href = frames[idx];
          if (Date.now() >= stopAt) stop();
        }, 600);
      }

      // Pause immediately when tab hidden; resume with brief pulse when visible again
      document.addEventListener('visibilitychange', function() {
        if (document.hidden) { stop(); }
        else { start(3000); }
      });

      // Start on load: 9s of animation (1.5 full cycles), then go static
      if (document.readyState === 'complete') { start(9000); }
      else { window.addEventListener('load', function() { start(9000); }); }
    })();
    </script>
  </body>
</html>
