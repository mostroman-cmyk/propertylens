<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="PropertyLens" />
    <title>PropertyLens</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
    (function() {
      function frame(scale) {
        var s = scale.toFixed(3);
        var t = 'translate(50,50) scale(' + s + ') translate(-50,-50)';
        return 'data:image/svg+xml,' + encodeURIComponent(
          '<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">' +
          '<path d="M8 30 L32 12 L56 30 L56 54 L8 54Z" fill="#000"/>' +
          '<rect x="27" y="39" width="10" height="15" fill="#fff"/>' +
          '<rect x="13" y="33" width="9" height="9" rx="1" fill="#fff"/>' +
          '<rect x="42" y="33" width="9" height="9" rx="1" fill="#fff"/>' +
          '<circle cx="50" cy="50" r="13" fill="#000" opacity="0.12"/>' +
          '<g transform="' + t + '">' +
            '<circle cx="50" cy="50" r="11" fill="#fff" stroke="#000" stroke-width="1.5"/>' +
            '<text x="50" y="55.5" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#2D7A3E">$</text>' +
          '</g></svg>'
        );
      }

      // Pulse: 1.0 → 1.15 → 1.0, then pause. 12 frames × 150ms ≈ 1.8s cycle.
      var scales = [1, 1.05, 1.10, 1.15, 1.10, 1.05, 1, 1, 1, 1, 1, 1];
      var frames = scales.map(frame);

      var idx = 0, tid = null, stopAt = 0;

      var link = document.querySelector("link[rel='icon']");
      if (!link) { link = document.createElement('link'); link.rel = 'icon'; link.type = 'image/svg+xml'; document.head.appendChild(link); }
      link.href = frames[0];

      function start(ms) {
        if (tid) return;
        idx = 0;
        stopAt = Date.now() + ms;
        tid = setInterval(function() {
          if (document.hidden) return;
          idx = (idx + 1) % frames.length;
          link.href = frames[idx];
          if (Date.now() >= stopAt) {
            clearInterval(tid); tid = null; idx = 0; link.href = frames[0];
          }
        }, 150);
      }

      // Animate for 6s on first load, 3s when user returns to tab
      window.addEventListener('load', function() { start(6000); });
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden && !tid) { start(3000); }
      });
    })();
    </script>
  </body>
</html>
